name: Compile RootX Firmware 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kode Lu
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Install Library
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SSD1306"

      - name: Compile RootX
        run: |
          # FQBN ini paksa ESP32-S3 jalan di 16MB Flash dan 8MB PSRAM mode OPI
          arduino-cli compile --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=opi,FlashMode=qio --export-binaries RootX

      - name: Upload File
        uses: actions/upload-artifact@v4
        with:
          name: RootX-Firmware
          # Path ini bakal ngambil semua file .bin, GAK ADA FILE MERGED!
          path: RootX/build/**/*.bin
          retention-days: 5
